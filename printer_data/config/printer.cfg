##############################################################################################################
## Hardware:
## Tevo Tornado - Modified
## Board: BTT SKR 1.4 Turbo
## X: Linear rail, custom carriage, BIQU H2 V2S extruder/hotend, 65W heater, dual 5015 fans
## Y: Heavy glass bed
## Z: Upgraded to Dual Z with Independent Drivers (Z-Tilt Adjustment)
## X/Y/Z: TMC2209 UART
## E: TMC2209 UART
## X/Y endstops: mechanical
## Z endstop: BLTouch clone
## Display: none (KlipperScreen only)
##############################################################################################################

[include mainsail.cfg]
[include mainsail_include.cfg]
[include core_macros.cfg]
[include maintenance_macros.cfg]
[include fans.cfg]
[include sfs.cfg]
#[include s2dw.cfg]
[include neopixel_ring_unified.cfg]

###########################################
### Setup Section                       ###
###########################################

[exclude_object]

[gcode_arcs]
resolution: 0.1

[force_move]
enable_force_move: True

[idle_timeout]
timeout: 2400
gcode:
  TURN_OFF_HEATERS
  M84

[verify_heater heater_bed]
check_gain_time: 240
hysteresis: 8
max_error: 400

###########################################
### Printer Setup                       ###
###########################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1769_1C50030FE484CA95FAD68F61C42000F5-if00
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 2400
max_z_velocity: 15
max_z_accel: 100
square_corner_velocity: 4.0

[stepper_x]
step_pin: P2.2
dir_pin: P2.6
enable_pin: !P2.1
microsteps: 16
rotation_distance: 40
endstop_pin: ^!P1.29
position_endstop: 0
position_min: 0
position_max: 315
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: P1.10
interpolate: True
run_current: 0.900
sense_resistor: 0.110
stealthchop_threshold: 120

[stepper_y]
step_pin: P0.19
dir_pin: !P0.20
enable_pin: !P2.8
microsteps: 16
rotation_distance: 40
endstop_pin: ^!P1.28
position_endstop: 0
position_max: 285
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: P1.9
interpolate: True
run_current: 1.10
sense_resistor: 0.110
stealthchop_threshold: 120

###########################################
### Z MOTORS � Dual Z with Z_TILT
### stepper_z  = LEFT  motor (Z port)
### stepper_z1 = RIGHT motor (E1 port)
###########################################

[stepper_z]
step_pin: P0.22
dir_pin: P2.11
enable_pin: !P0.21
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_min: -3.0
position_max: 300
homing_speed: 15
homing_retract_dist: 3.0

[tmc2209 stepper_z]
uart_pin: P1.8
interpolate: True
run_current: 0.900
stealthchop_threshold: 999999

[stepper_z1]
step_pin: P1.15
dir_pin: P1.14
enable_pin: !P1.16
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200

[tmc2209 stepper_z1]
uart_pin: P1.1
interpolate: True
run_current: 0.900
stealthchop_threshold: 999999

###########################################
### Z_TILT � Automatic gantry leveling
###########################################

[z_tilt]
z_positions:
    -25, 150   # Left Z motor: 25mm to the left of X=0 (motor geometry � unchanged)
    325, 150   # Right Z motor: 25mm to the right of X=300 (motor geometry � unchanged)
points:
    27, 165    # Nozzle target -> probe lands at X=10, Y=142  (near left edge)
    307, 165   # Nozzle target -> probe lands at X=290, Y=142 (near right edge, 8mm buffer off X max)
speed: 150
horizontal_move_z: 8
retries: 5
retry_tolerance: 0.050

[extruder]
step_pin: P2.13
dir_pin: !P0.11
enable_pin: !P2.12
microsteps: 16
rotation_distance: 3.465
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: P2.7
sensor_type: Generic 3950
sensor_pin: P0.24
min_temp: 5
max_temp: 285
min_extrude_temp: 170
max_extrude_only_distance: 500.0
max_extrude_only_velocity: 25
max_extrude_only_accel: 300
pressure_advance: 0.050
pressure_advance_smooth_time: 0.040

[tmc2209 extruder]
uart_pin: P1.4
run_current: 0.80
sense_resistor: 0.110
interpolate: True
stealthchop_threshold: 0

[heater_bed]
heater_pin: P2.5
sensor_type: Generic 3950
sensor_pin: P0.25
pwm_cycle_time: 0.01666
min_temp: 5
max_temp: 100

[bltouch]
sensor_pin: ^P0.10
control_pin: P2.0
x_offset: -17
y_offset: -23
stow_on_each_sample: True
probe_with_touch_mode: False
speed: 10
lift_speed: 20
samples: 3
samples_result: median
sample_retract_dist: 8.0
samples_tolerance: 0.05
samples_tolerance_retries: 3

[safe_z_home]
home_xy_position: 182, 173   # nozzle target � probe lands at X=165, Y=150 (new bed center)
speed: 100
z_hop: 6
z_hop_speed: 15

[bed_mesh]
speed: 150
horizontal_move_z: 8
mesh_min: 15, 5
mesh_max: 296, 255
probe_count: 6,6
algorithm: bicubic
bicubic_tension: 0.2
fade_start: 1.0
fade_end: 5.0
mesh_pps: 2,2
adaptive_margin: 5


