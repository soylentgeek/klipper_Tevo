########################################
# Gcode macros and misc
########################################

#####################################################################
# SFS SAFETY STUBS
# These prevent PAUSE/RESUME/LOAD/UNLOAD from hard-failing if sfs.cfg
# isn't loaded (missing include, parse error, etc.).
# If real SFS macros exist, Klipper will use those instead.
#####################################################################

[gcode_macro _SFS_STATE]
variable_runout_enabled: 0
variable_motion_enabled: 0
gcode:
  ; no-op stub

[gcode_macro _SFS_APPLY]
gcode:
  ; no-op stub

[gcode_macro SENSOR_OFF]
gcode:
  M118 SFS: SENSOR_OFF (stub) — sfs.cfg not loaded

[gcode_macro SENSOR_ON]
gcode:
  M118 SFS: SENSOR_ON (stub) — sfs.cfg not loaded

[gcode_macro SFS_STATUS]
gcode:
  M118 SFS_STATUS (stub) — sfs.cfg not loaded


#####################################################################
# PAUSE / RESUME / CANCEL EXTRAS
# These helper macros are called via _CLIENT_VARIABLE hooks in
# mainsail_include.cfg. Mainsail owns the actual PAUSE/RESUME/CANCEL
# rename chain — we just inject our SFS and LED logic here.
#####################################################################

[gcode_macro _PAUSE_EXTRAS]
description: Called by mainsail PAUSE hook — SFS disable + LED + idle timeout
gcode:
    {% set s = printer["gcode_macro _SFS_STATE"] %}
    {% set prev_runout = s.runout_enabled|int %}
    {% set prev_motion = s.motion_enabled|int %}

    # Save SFS state for RESUME to restore
    SET_GCODE_VARIABLE MACRO=_RESUME_EXTRAS VARIABLE=restore_sfs_runout VALUE={prev_runout}
    SET_GCODE_VARIABLE MACRO=_RESUME_EXTRAS VARIABLE=restore_sfs_motion VALUE={prev_motion}

    # Always reset the resume purge-stage on a FRESH pause, so a stale
    # purge_done=True from a previous pause/cancel never carries over
    SET_GCODE_VARIABLE MACRO=_RESUME_EXTRAS VARIABLE=purge_done VALUE=False

    SENSOR_OFF
    M118 SFS: disabled for PAUSE

    RING_PAUSED

    # Extend idle timeout while paused (12 hours)
    SET_IDLE_TIMEOUT TIMEOUT=43200

    RESPOND TYPE=echo MSG="PAUSE: SFS gated off, ring set to paused"


[gcode_macro _RESUME_ABORT]
description: Internal helper — aborts the RESUME chain after Stage 1 purge so RESUME_BASE does not fire early. Called as a plain command from _RESUME_EXTRAS, never inline with {}.
gcode:
    {action_raise_error("Purge done — clear the blob, then press RESUME again to continue the print")}


[gcode_macro _RESUME_EXTRAS]
description: Called by mainsail RESUME hook — 2-stage purge-and-continue, SFS restore, LED
variable_restore_sfs_runout: 0
variable_restore_sfs_motion: 0
variable_purge_done: False
gcode:
    {% set cfg = printer["gcode_macro _RESUME_EXTRAS"] %}

    {% if not cfg.purge_done %}
        # ---- STAGE 1: first RESUME press after a pause ----
        {% set min_temp = 200 %}
        {% if printer.extruder.temperature < min_temp %}
            RESPOND TYPE=echo MSG="RESUME: Nozzle below {min_temp}C — waiting for temp"
            M109 S{printer.extruder.target}
        {% endif %}

        RESPOND TYPE=echo MSG="RESUME: Purging in place"
        M83
        G92 E0
        G1 E8 F120
        G1 E-1.0 F900
        G92 E0

        SET_GCODE_VARIABLE MACRO=_RESUME_EXTRAS VARIABLE=purge_done VALUE=True
        M118 === CLEAR THE PURGE BLOB, THEN PRESS RESUME AGAIN ===
        _RESUME_ABORT

    {% else %}
        # ---- STAGE 2: second RESUME press — actually continue ----
        SET_GCODE_VARIABLE MACRO=_RESUME_EXTRAS VARIABLE=purge_done VALUE=False

        SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=runout_enabled VALUE={restore_sfs_runout|int}
        SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=motion_enabled VALUE={restore_sfs_motion|int}
        _SFS_APPLY

        M118 SFS: restored after RESUME -> runout={restore_sfs_runout|int} motion={restore_sfs_motion|int}
        SFS_STATUS

        PRINT_RING_START MODE=2
        RESPOND TYPE=echo MSG="RESUME: Ready — returning to print"
    {% endif %}


[gcode_macro _CANCEL_EXTRAS]
description: Called by mainsail CANCEL_PRINT hook — SFS disable + LED + fans
gcode:
    SENSOR_OFF
    M118 SFS: disabled for CANCEL_PRINT

    PRINT_RING_ERROR
    RING_AUTO_OFF SECONDS=60

    PSU_FANS_OFF

    RESPOND TYPE=echo MSG="CANCEL_PRINT: SFS gated off, fans off"


#####################################################################
# M17 — Marlin-style enable all steppers
#####################################################################

[gcode_macro M17]
description: (Marlin-style) Enable all steppers
gcode:
  SET_STEPPER_ENABLE STEPPER=stepper_x ENABLE=1
  SET_STEPPER_ENABLE STEPPER=stepper_y ENABLE=1
  SET_STEPPER_ENABLE STEPPER=stepper_z ENABLE=1
  SET_STEPPER_ENABLE STEPPER=extruder ENABLE=1
  M118 Steppers enabled (Klipper M17 macro)


#####################################################################
# PRIME LINE
#####################################################################

[gcode_macro PRIME_LINE_Y]
gcode:
    {% set xs_in    = (params.X|default(5.0))|float %}
    {% set ys_in    = (params.Y_START|default(0.0))|float %}
    {% set ye_in    = (params.Y_END|default(285.0))|float %}
    {% set lh       = (params.LH|default(0.28))|float %}
    {% set lw       = (params.LW|default(0.50))|float %}
    {% set pre      = (params.PRE_E|default(0.8))|float %}
    {% set z_offset = (params.Z_OFFSET|default(0.08))|float %}
    {% set travel   = 6000 %}
    {% set draw     = 1800 %}

    # HARD CLAMPS
    {% set x_min = 5.0 %}
    {% set x_max = printer.toolhead.axis_maximum.x|float - 5.0 %}
    {% set y_min = 0.0 %}
    {% set y_max = printer.toolhead.axis_maximum.y|float - 5.0 %}

    {% set xs = xs_in %}
    {% if xs < x_min %}{% set xs = x_min %}{% endif %}
    {% if xs > x_max %}{% set xs = x_max %}{% endif %}

    {% set ys = ys_in %}
    {% if ys < y_min %}{% set ys = y_min %}{% endif %}
    {% if ys > y_max %}{% set ys = y_max %}{% endif %}

    {% set ye = ye_in %}
    {% if ye < y_min %}{% set ye = y_min %}{% endif %}
    {% if ye > y_max %}{% set ye = y_max %}{% endif %}

    {% set purge_h = lh + z_offset %}
    {% set length  = (ye - ys)|abs %}

    # Volumetric calc
    {% set vol_mm3 = lw * lh * length %}
    {% set fd      = printer.configfile.settings.extruder.filament_diameter|default(1.75)|float %}
    {% set area_f  = 3.14159 * (fd/2.0)**2 %}
    {% set line_e  = (vol_mm3 / area_f) %}

    RESPOND TYPE=echo MSG="{ 'Prime: X=%.1f Y=%.1f->%.1f Z=%.2f E=%.2f (pre=%.2f line=%.2f)'|format(xs, ys, ye, purge_h, line_e+pre, pre, line_e) }"

    G90
    M83
    G92 E0

    # Move into position slightly above surface first (prevents gouging)
    G1 Z{purge_h + 0.2} F600
    G1 X{xs} Y{ys} F{travel}

    # Drop to purge height
    G1 Z{purge_h} F480

    # Controlled pre-charge
    G1 E{pre} F300

    # Draw purge line
    G1 Y{ye} E{line_e} F{draw}

    # Clean break
    G1 E-0.5 F1800
    G1 Z{purge_h + 0.5} F600

    G92 E0
    M82


#####################################################################
# START / END PRINT
#####################################################################

[gcode_macro START_PRINT]
gcode:
    # --- LED ring: clear any previous scene/effect ---
    RING_STOP

    # Ensure sensors are OFF during heat/home/mesh/prime
    SENSOR_OFF

    # PSU fans ON at 50% for the whole print
    PSU_FANS_ON

    # Accel and SCV come from slicer (Orca) — no SET_VELOCITY_LIMIT here

    {% set BED_TEMP      = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}
    {% set STANDBY_TEMP  = params.STANDBY_TEMP|default(150)|float %}

    RESPOND TYPE=echo MSG="START_PRINT: Preheating bed + nozzle standby"
    M140 S{BED_TEMP}
    M104 S{STANDBY_TEMP}

    M190 S{BED_TEMP}

    RESPOND TYPE=echo MSG="START_PRINT: Homing"
    G90
    G28

    RESPOND TYPE=echo MSG="START_PRINT: Z tilt adjust"
    Z_TILT_ADJUST

    RESPOND TYPE=echo MSG="START_PRINT: Adaptive bed mesh"
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5

    RESPOND TYPE=echo MSG="START_PRINT: Final nozzle heat"
    M109 S{EXTRUDER_TEMP}

    RESPOND TYPE=echo MSG="START_PRINT: Prime line"
    PRIME_LINE_Y X=15 Y_START=10 Y_END=280 LH=0.28 LW=0.50 PRE_E=0.8 Z_OFFSET=0.08   # Safe Y_END parameter

    RESPOND TYPE=echo MSG="START_PRINT: Printing"
    PRINT_RING_START MODE=2

    # Arm sensors for the actual print
    SENSOR_ON
    M118 SFS: armed for print (runout+motion enabled)
    SFS_STATUS


[gcode_macro END_PRINT]
gcode:
    RESPOND TYPE=echo MSG="END_PRINT: Finishing"

    # Disarm sensors immediately
    SENSOR_OFF

    PRINT_RING_DONE
    RING_AUTO_OFF SECONDS=300

    # Park toolhead
    {% set safe_z = [printer.toolhead.position.z + 40, printer.toolhead.axis_maximum.z - 5]|min %}
    G90
    G1 Z{safe_z} F480
    G1 E-2 F2400
    G1 X0 Y270 F6000

    # Kill heaters immediately
    M104 S0
    M140 S0

    # Blast part fan for 30s — cools the print and gives the hotend a head start
    M106 S255
    G4 P30000
    M106 S0

    # Shut down all fans
    PSU_FANS_OFF
    #SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=mcu_cooling TARGET=0

    M84
    RESPOND TYPE=echo MSG="END_PRINT: Done"


#####################################################################
# FILAMENT LOAD / UNLOAD
#####################################################################

[gcode_macro UNLOAD_FILAMENT]
gcode:
    SAVE_GCODE_STATE NAME=unload_state

    {% set s = printer["gcode_macro _SFS_STATE"] %}
    {% set prev_motion = s.motion_enabled|int %}

    # Disable motion sensor during manual filament handling
    SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=motion_enabled VALUE=0
    _SFS_APPLY
    M118 SFS: motion temporarily disabled for UNLOAD (was={prev_motion})

    {% if printer.extruder.temperature < 210 %}
        RESPOND TYPE=echo MSG="UNLOAD_FILAMENT: Heating to 220C"
        M109 S220
    {% endif %}

    M83
    G91
    G92 E0

    # Small push first to soften the tip
    G1 E3 F180

    # Short fast release from melt zone
    G1 E-8 F1800

    # Main unload
    G1 E-60 F600

    G90
    RESTORE_GCODE_STATE NAME=unload_state

    # Restore previous motion enable state
    SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=motion_enabled VALUE={prev_motion}
    _SFS_APPLY
    M118 SFS: motion restore after UNLOAD -> {prev_motion}


[gcode_macro LOAD_FILAMENT]
gcode:
    SAVE_GCODE_STATE NAME=load_state

    {% set s = printer["gcode_macro _SFS_STATE"] %}
    {% set prev_motion = s.motion_enabled|int %}

    # Disable motion sensor during manual filament handling
    SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=motion_enabled VALUE=0
    _SFS_APPLY
    M118 SFS: motion temporarily disabled for LOAD (was={prev_motion})

    {% if printer.extruder.temperature < 210 %}
        RESPOND TYPE=echo MSG="LOAD_FILAMENT: Heating to 220C"
        M109 S220
    {% endif %}

    M83
    G91
    G92 E0

    # Feed into gears / hotend path
    G1 E20 F600

    # Slower approach into melt zone
    G1 E20 F240

    # Controlled purge
    G1 E20 F120

    # Small pressure relief
    G1 E-0.6 F900

    G90
    RESTORE_GCODE_STATE NAME=load_state

    # Restore previous motion enable state
    SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=motion_enabled VALUE={prev_motion}
    _SFS_APPLY
    M118 SFS: motion restore after LOAD -> {prev_motion}


#####################################################################
# M600 — Filament change
#####################################################################

[gcode_macro M600]
variable_park_x: 50
variable_park_y: 0
variable_park_z_hop: 10
variable_extrude_temp: 205
variable_was_called: False
gcode:
    {% set cfg = printer["gcode_macro M600"] %}
    {% set X = params.X|default(cfg.park_x)|float %}
    {% set Y = params.Y|default(cfg.park_y)|float %}
    {% set Z = params.Z|default(cfg.park_z_hop)|float %}

    {% set unload_param = params.UNLOAD|default("1")|string %}
    {% set do_unload   = unload_param|lower in ["1", "true", "yes"] %}

    RESPOND TYPE=echo MSG="M600: Filament change initiated"
    SAVE_GCODE_STATE NAME=M600_state
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=was_called VALUE=True
    PAUSE

    {% if printer.extruder.temperature < cfg.extrude_temp %}
        RESPOND TYPE=echo MSG="M600: Heating for filament change"
        M109 S{cfg.extrude_temp}
    {% endif %}

    G91
    G1 Z{Z} F480
    G90
    G1 X{X} Y{Y} F3000

    {% if do_unload %}
        RESPOND TYPE=echo MSG="M600: Unloading old filament"
        UNLOAD_FILAMENT
    {% else %}
        RESPOND TYPE=echo MSG="M600: Skipping unload"
    {% endif %}

    RESPOND TYPE=echo MSG="M600: Insert new filament and press RESUME"
    RESTORE_GCODE_STATE NAME=M600_state