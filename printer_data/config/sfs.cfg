#####################################################################
# sfs.cfg — BTT SFS v2 (switch + motion) — RUNOUT PAUSES, MOTION LOGS
#
# Wiring (your setup):
# - Runout switch:  P1.25  (use pullup ^)
# - Motion encoder: P1.26  (use pullup ^)
#
# Policy:
# - Switch sensor = hard runout -> PAUSE (only if printing)
# - Motion sensor = logging only (no pause) while we learn a stable detection_length
#####################################################################

#####################################################################
# SFS MACROS — state + enable/disable + status
#
# These macros are used by START_PRINT / PAUSE / RESUME / LOAD / UNLOAD.
# They DO NOT change the filament_switch_sensor behavior (runout still pauses).
#
# Policy:
# - runout_enabled: if 0, runout_gcode exits early (no PAUSE)
# - motion_enabled: if 0, motion runout_gcode exits early (no log spam)
#####################################################################

[gcode_macro _SFS_STATE]
variable_runout_enabled: 1
variable_motion_enabled: 0
gcode:
  ; state holder only

[gcode_macro _SFS_APPLY]
gcode:
  ; No hardware toggles exist for these sensors. We gate behavior in runout_gcode.

[gcode_macro SENSOR_OFF]
description: Disable SFS actions (runout + motion) via gating variables
gcode:
  SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=runout_enabled VALUE=0
  SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=motion_enabled VALUE=0
  M118 [SFS] Sensors gated OFF (runout+motion)

[gcode_macro SENSOR_ON]
description: Enable SFS actions (runout + motion) via gating variables
gcode:
  SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=runout_enabled VALUE=1
  SET_GCODE_VARIABLE MACRO=_SFS_STATE VARIABLE=motion_enabled VALUE=1
  M118 [SFS] Sensors gated ON (runout+motion)

[gcode_macro SFS_STATUS]
description: Print current SFS gating status
gcode:
  {% set s = printer["gcode_macro _SFS_STATE"] %}
  M118 [SFS] STATUS: runout_enabled={s.runout_enabled|int} motion_enabled={s.motion_enabled|int}


#####################################################################
# RUNOUT SWITCH (hard runout -> PAUSE)
#####################################################################
[filament_switch_sensor filament_runout]
switch_pin: ^P1.25

pause_on_runout: False
event_delay: 2.0
pause_delay: 0.5

runout_gcode:
  {% set s = printer["gcode_macro _SFS_STATE"] %}
  {% if s.runout_enabled|int == 0 %}
    M118 [SFS] RUNOUT SWITCH: gated off -> ignored
  {% elif printer.print_stats.state == "printing" %}
    M118 [SFS] RUNOUT SWITCH: Filament runout detected -> PAUSE
    PRINT_RING_ERROR
    PAUSE
  {% else %}
    M118 [SFS] RUNOUT SWITCH: triggered (not printing) -> ignored
  {% endif %}



