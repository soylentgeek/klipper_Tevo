####################################################################
# neopixel_ring_unified.cfg
#
# 16-LED ring — SKR 1.4 Turbo / Tevo Tornado
# Pin: P1.24
# LED type: WS2812 / NeoPixel
#
# Philosophy:
# - Status only. No animation. No tick loops. No CPU overhead.
# - LEDs tell you what the printer is doing at a glance.
# - Off when idle. On only when relevant.
#
# Status map:
#   Boot / Idle      → Off
#   Print Start      → Solid Green  (25%)
#   Pause            → Solid Yellow (25%)
#   Resume           → Solid Green  (25%)
#   Done             → Solid Teal   (25%, auto-off after 5 min)
#   Error / Cancel   → Solid Red    (30%, auto-off after 1 min)
#
# Macro surface (call these from your other configs):
#   RING_PRINTING    → green
#   RING_PAUSED      → yellow
#   RING_DONE        → teal + auto-off 300s
#   RING_ERROR       → red  + auto-off 60s
#   RING_OFF         → immediate off
#   RING_AUTO_OFF SECONDS=n → delayed off
####################################################################


####################################################################
# HARDWARE
####################################################################

[neopixel status_leds]
pin: P1.24
chain_count: 16
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0


####################################################################
# BOOT — ensure LEDs are off after Klipper starts
####################################################################

[delayed_gcode _RING_BOOT_OFF]
initial_duration: 2.0
gcode:
  RING_OFF


####################################################################
# INTERNAL HELPER — set all 16 LEDs to one color
####################################################################

[gcode_macro _RING_SET_ALL]
description: Internal — set all 16 LEDs to R/G/B
gcode:
  {% set r = params.R|default(0.0)|float %}
  {% set g = params.G|default(0.0)|float %}
  {% set b = params.B|default(0.0)|float %}
  {% for i in range(1, 16) %}
    SET_LED LED=status_leds INDEX={i} RED={r} GREEN={g} BLUE={b} TRANSMIT=0
  {% endfor %}
  SET_LED LED=status_leds INDEX=16 RED={r} GREEN={g} BLUE={b} TRANSMIT=1


####################################################################
# AUTO-OFF TIMER
####################################################################

[gcode_macro RING_AUTO_OFF]
description: Turn ring off after SECONDS=n (default 60)
gcode:
  {% set s = params.SECONDS|default(60)|int %}
  UPDATE_DELAYED_GCODE ID=_RING_AUTO_OFF_TIMER DURATION={s}

[delayed_gcode _RING_AUTO_OFF_TIMER]
initial_duration: 0
gcode:
  RING_OFF


####################################################################
# PUBLIC STATUS MACROS
####################################################################

[gcode_macro RING_OFF]
description: Turn all LEDs off immediately
gcode:
  UPDATE_DELAYED_GCODE ID=_RING_AUTO_OFF_TIMER DURATION=0
  _RING_SET_ALL R=0.0 G=0.0 B=0.0

[gcode_macro RING_PRINTING]
description: Solid green 25% — print running
gcode:
  UPDATE_DELAYED_GCODE ID=_RING_AUTO_OFF_TIMER DURATION=0
  _RING_SET_ALL R=0.0 G=0.25 B=0.0

[gcode_macro RING_PAUSED]
description: Solid yellow 25% — print paused
gcode:
  UPDATE_DELAYED_GCODE ID=_RING_AUTO_OFF_TIMER DURATION=0
  _RING_SET_ALL R=0.25 G=0.18 B=0.0

[gcode_macro RING_DONE]
description: Solid teal 25% — print finished, auto-off after 5 min
gcode:
  _RING_SET_ALL R=0.0 G=0.20 B=0.20
  RING_AUTO_OFF SECONDS=300

[gcode_macro RING_ERROR]
description: Solid red 30% — error or cancel, auto-off after 1 min
gcode:
  _RING_SET_ALL R=0.30 G=0.0 B=0.0
  RING_AUTO_OFF SECONDS=60


####################################################################
# COMPATIBILITY STUBS
# These preserve existing macro call names used in core_macros.cfg
# so nothing else needs to change.
####################################################################

[gcode_macro RING_STOP]
description: Alias for RING_OFF — used in START_PRINT
gcode:
  RING_OFF

[gcode_macro PRINT_RING_START]
description: Alias for RING_PRINTING — called at print start
gcode:
  RING_PRINTING

[gcode_macro PRINT_RING_DONE]
description: Alias for RING_DONE — called at print end
gcode:
  RING_DONE

[gcode_macro PRINT_RING_ERROR]
description: Alias for RING_ERROR — called on cancel/error
gcode:
  RING_ERROR