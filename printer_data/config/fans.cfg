#####################################################################
# fans.cfg — STABLE / CLEAN
# SKR 1.4 Turbo pins:
#   FAN0 = P2.3  (Part cooling - slicer M106/M107)
#   HE1  = P2.4  (Use as Extruder heatsink fan - auto)
#####################################################################

#####################################################################
# PART COOLING — FAN0 (controlled by slicer / M106/M107)
# NOTE: Mainsail will likely label this as "Fan". That's normal.
#####################################################################
[fan]
pin: P2.3
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.15
hardware_pwm: False


#####################################################################
# EXTRUDER HEATSINK — HE1 (automatic, based on extruder temp)
# This is your "prevent badness" fan.
#####################################################################
[heater_fan extruder_heatsink]
pin: P2.4
heater: extruder
heater_temp: 40.0
fan_speed: 1.0
kick_start_time: 0.5
shutdown_speed: 1.0
hardware_pwm: False


#####################################################################
# MCU COOLING — TEMP CONTROLLED (TH1 sensor)
# Shows up in Mainsail Temperatures with a settable Target.
#####################################################################
[temperature_fan mcu_cooling]
pin: P1.27

sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.23

min_temp: -20
max_temp: 120

control: watermark
target_temp: 35.0
max_delta: 3.0

max_power: 1.0
min_speed: 0.0
max_speed: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.15
hardware_pwm: False

gcode_id: MCU


#####################################################################
# PSU COOLING 1 — MANUAL
#####################################################################
[fan_generic psu_cooling_1]
pin: P1.31
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.15
hardware_pwm: False


#####################################################################
# PSU COOLING 2 — MANUAL
#####################################################################
[fan_generic psu_cooling_2]
pin: P3.25
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.15
hardware_pwm: False


#####################################################################
# MACROS — QUALITY OF LIFE
#####################################################################

# --- PSU: one macro controls BOTH fans together ---
[gcode_macro _Mcu_Cooling_Target]
description: Set MCU Cooling target temp. Usage: _Mcu_Cooling_Target TARGET=45
gcode:
  {% set t = params.TARGET|default(40)|float %}
  SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=mcu_cooling TARGET={t}
  M118 [MCU_COOLING] target={t}C



[gcode_macro PSU_FANS_ON]
gcode:
  SET_FAN_SPEED FAN=psu_cooling_1 SPEED=0.50
  SET_FAN_SPEED FAN=psu_cooling_2 SPEED=0.50
  M118 [PSU_FANS] ON at 50%

[gcode_macro PSU_FANS_OFF]
gcode:
  SET_FAN_SPEED FAN=psu_cooling_1 SPEED=0.00
  SET_FAN_SPEED FAN=psu_cooling_2 SPEED=0.00
  M118 [PSU_FANS] OFF