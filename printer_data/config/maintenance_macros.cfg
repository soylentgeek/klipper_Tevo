[gcode_macro Extruder_PID]
gcode:
    RESPOND TYPE=echo MSG="PID_CALIBRATE: extruder -> 225C"
    PID_CALIBRATE HEATER=extruder TARGET=225

[gcode_macro Bed_PID]
gcode:
    RESPOND TYPE=echo MSG="PID_CALIBRATE: bed -> 70C"
    PID_CALIBRATE HEATER=heater_bed TARGET=70

[gcode_macro Calibrate_Probe]
gcode:
    RESPOND TYPE=echo MSG="PROBE_CALIBRATE"
    G28
    PROBE_CALIBRATE

[gcode_macro Shake]
gcode:
    RESPOND TYPE=echo MSG="SHAPER_CALIBRATE"
    G28
    SHAPER_CALIBRATE

#####################################################################
# BED_LEVEL macro — homes, corrects Z-Tilt
#####################################################################
[gcode_macro BED_LEVEL]
description: Home and run automatic dual Z-tilt adjustment
gcode:
    RESPOND TYPE=echo MSG="BED_LEVEL: Homing all axes"
    G28
    RESPOND TYPE=echo MSG="BED_LEVEL: Aligning independent Dual Z axes"
    Z_TILT_ADJUST
    RESPOND TYPE=echo MSG="BED_LEVEL: Re-homing Z axis after alignment"
    G28 Z